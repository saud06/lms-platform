services:
  # Backend Laravel API Service (Docker)
  - type: web
    name: lms-backend
    env: docker
    rootDir: ./backend
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /api/test
    envVars:
      - key: APP_NAME
        value: "LMS Platform"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: errorlog
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: lms-database
          property: host
      - key: DB_PORT
        fromDatabase:
          name: lms-database
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: lms-database
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: lms-database
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: lms-database
          property: password
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: SESSION_LIFETIME
        value: "120"
      - key: QUEUE_CONNECTION
        value: sync
      - key: MAIL_MAILER
        value: log
      - key: JWT_ALGO
        value: HS256
      - key: JWT_TTL
        value: "60"
      - key: APP_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true

  # Frontend React Application (Static Site)
  - type: web
    name: lms-frontend
    env: static
    rootDir: ./frontend
    buildCommand: "rm -rf node_modules/.cache && npm ci --include=dev && npm run build"
    staticPublishPath: ./dist
    envVars:
      - key: NODE_ENV
        value: production
      # Backend URL - using the actual service URL from Render
      - key: VITE_API_URL
        value: https://lms-backend-thlg.onrender.com

# Database
databases:
  - name: lms-database
    databaseName: lms_platform
    user: lms_user
    plan: free
    region: oregon