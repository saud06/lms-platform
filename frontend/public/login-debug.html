<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Login Debug</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
        button { padding: 10px 15px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #0056b3; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; max-height: 400px; overflow-y: auto; }
        .status { font-weight: bold; }
    </style>
</head>
<body>
    <h1>Backend Login Debug Tool</h1>
    
    <div class="test-section info">
        <h3>Backend URL</h3>
        <p><strong>Detected Backend:</strong> <span id="backendUrl"></span></p>
    </div>

    <div class="test-section">
        <h3>Login Debug Tests</h3>
        <button onclick="testSimpleJson()">Test Simple JSON (/test/json)</button>
        <button onclick="testSimpleLogin()">Test Simple Login (/test/login)</button>
        <button onclick="testActualLogin()">Test Actual Login (/login)</button>
        <button onclick="testWithRawFetch()">Test with Raw Fetch</button>
        <button onclick="clearResults()">Clear Results</button>
    </div>

    <div id="results"></div>

    <script>
        // Get backend URL
        function getBackendUrl() {
            const hostname = window.location.hostname;
            if (hostname.includes('onrender.com')) {
                if (hostname.includes('lms-frontend-2ksd')) {
                    return 'https://lms-backend-thlg.onrender.com/api';
                }
                return 'https://lms-backend-thlg.onrender.com/api';
            }
            return '/api';
        }

        const backendUrl = getBackendUrl();
        document.getElementById('backendUrl').textContent = backendUrl;

        function addResult(title, status, data, isError = false) {
            const resultsDiv = document.getElementById('results');
            const testDiv = document.createElement('div');
            testDiv.className = `test-section ${isError ? 'error' : 'success'}`;
            
            testDiv.innerHTML = `
                <h4>${title}</h4>
                <p class="status">Status: ${status}</p>
                <pre>${JSON.stringify(data, null, 2)}</pre>
            `;
            
            resultsDiv.appendChild(testDiv);
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        async function testSimpleJson() {
            try {
                console.log('Testing simple JSON endpoint:', backendUrl + '/test/json');
                const response = await fetch(backendUrl + '/test/json', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });
                
                const responseText = await response.text();
                console.log('Raw response text:', responseText);
                
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (parseError) {
                    data = { 
                        parseError: parseError.message, 
                        rawResponse: responseText,
                        responseLength: responseText.length 
                    };
                }
                
                addResult('Simple JSON Test', `${response.status} ${response.statusText}`, {
                    status: response.status,
                    headers: Object.fromEntries(response.headers.entries()),
                    responseLength: responseText.length,
                    data: data
                }, !response.ok);
            } catch (error) {
                addResult('Simple JSON Test', 'Network Error', {
                    error: error.message,
                    stack: error.stack
                }, true);
            }
        }

        async function testSimpleLogin() {
            try {
                console.log('Testing simple login endpoint:', backendUrl + '/test/login');
                const response = await fetch(backendUrl + '/test/login', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json',
                        'Origin': window.location.origin
                    },
                    body: JSON.stringify({
                        email: 'admin@example.com',
                        password: 'password'
                    })
                });
                
                const responseText = await response.text();
                console.log('Raw response text:', responseText);
                
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (parseError) {
                    data = { 
                        parseError: parseError.message, 
                        rawResponse: responseText,
                        responseLength: responseText.length 
                    };
                }
                
                addResult('Simple Login Test', `${response.status} ${response.statusText}`, {
                    status: response.status,
                    headers: Object.fromEntries(response.headers.entries()),
                    responseLength: responseText.length,
                    data: data
                }, !response.ok);
            } catch (error) {
                addResult('Simple Login Test', 'Network Error', {
                    error: error.message
                }, true);
            }
        }

        async function testActualLogin() {
            try {
                console.log('Testing actual login endpoint:', backendUrl + '/login');
                const response = await fetch(backendUrl + '/login', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json',
                        'Origin': window.location.origin
                    },
                    body: JSON.stringify({
                        email: 'admin@example.com',
                        password: 'password'
                    })
                });
                
                const responseText = await response.text();
                console.log('Raw response text:', responseText);
                console.log('Response headers:', [...response.headers.entries()]);
                
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (parseError) {
                    data = { 
                        parseError: parseError.message, 
                        rawResponse: responseText,
                        responseLength: responseText.length,
                        contentType: response.headers.get('content-type'),
                        contentLength: response.headers.get('content-length')
                    };
                }
                
                addResult('Actual Login Test', `${response.status} ${response.statusText}`, {
                    status: response.status,
                    headers: Object.fromEntries(response.headers.entries()),
                    responseLength: responseText.length,
                    data: data
                }, !response.ok);
            } catch (error) {
                addResult('Actual Login Test', 'Network Error', {
                    error: error.message
                }, true);
            }
        }

        async function testWithRawFetch() {
            try {
                console.log('Testing with XMLHttpRequest for more details');
                
                const xhr = new XMLHttpRequest();
                xhr.open('POST', backendUrl + '/login', true);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.setRequestHeader('Accept', 'application/json');
                xhr.setRequestHeader('Origin', window.location.origin);
                
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        const result = {
                            status: xhr.status,
                            statusText: xhr.statusText,
                            responseText: xhr.responseText,
                            responseLength: xhr.responseText.length,
                            headers: xhr.getAllResponseHeaders(),
                            readyState: xhr.readyState
                        };
                        
                        addResult('Raw XMLHttpRequest Test', `${xhr.status} ${xhr.statusText}`, result, xhr.status !== 200);
                    }
                };
                
                xhr.send(JSON.stringify({
                    email: 'admin@example.com',
                    password: 'password'
                }));
                
            } catch (error) {
                addResult('Raw XMLHttpRequest Test', 'Error', {
                    error: error.message
                }, true);
            }
        }

        // Auto-run simple test on load
        setTimeout(() => {
            testSimpleJson();
        }, 1000);
    </script>
</body>
</html>
