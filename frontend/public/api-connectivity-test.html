<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Connectivity Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
        button { padding: 10px 15px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #0056b3; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; max-height: 300px; overflow-y: auto; }
        .status { font-weight: bold; }
    </style>
</head>
<body>
    <h1>LMS Platform - API Connectivity Test</h1>
    
    <div class="test-section info">
        <h3>Current Environment Info</h3>
        <p><strong>URL:</strong> <span id="currentUrl"></span></p>
        <p><strong>Hostname:</strong> <span id="currentHostname"></span></p>
        <p><strong>Origin:</strong> <span id="currentOrigin"></span></p>
        <p><strong>Is Render:</strong> <span id="isRender"></span></p>
        <p><strong>Detected Backend URL:</strong> <span id="detectedBackendUrl"></span></p>
    </div>

    <div class="test-section">
        <h3>API Connectivity Tests</h3>
        <button onclick="testHealthEndpoint()">Test Health Endpoint (/api/test)</button>
        <button onclick="testDebugEndpoint()">Test Debug Endpoint (/api/debug)</button>
        <button onclick="testCorsEndpoint()">Test CORS Endpoint (/api/debug/cors)</button>
        <button onclick="testLoginEndpoint()">Test Login Endpoint</button>
        <button onclick="clearResults()">Clear Results</button>
    </div>

    <div id="results"></div>

    <script>
        // Environment detection logic (similar to api.jsx)
        function getBackendUrl() {
            const hostname = window.location.hostname;
            const origin = window.location.origin;
            
            if (hostname.includes('onrender.com')) {
                // Use the correct backend URL for your specific deployment
                if (hostname.includes('lms-frontend-2ksd')) {
                    return 'https://lms-backend-thlg.onrender.com/api';
                }
                // Fallback to the backend URL from render.yaml
                return 'https://lms-backend-thlg.onrender.com/api';
            }
            
            // Development fallback
            return '/api';
        }

        // Update environment info
        document.getElementById('currentUrl').textContent = window.location.href;
        document.getElementById('currentHostname').textContent = window.location.hostname;
        document.getElementById('currentOrigin').textContent = window.location.origin;
        document.getElementById('isRender').textContent = window.location.hostname.includes('onrender.com');
        
        const backendUrl = getBackendUrl();
        document.getElementById('detectedBackendUrl').textContent = backendUrl;

        function addResult(title, status, data, isError = false) {
            const resultsDiv = document.getElementById('results');
            const testDiv = document.createElement('div');
            testDiv.className = `test-section ${isError ? 'error' : 'success'}`;
            
            testDiv.innerHTML = `
                <h4>${title}</h4>
                <p class="status">Status: ${status}</p>
                <pre>${JSON.stringify(data, null, 2)}</pre>
            `;
            
            resultsDiv.appendChild(testDiv);
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        async function testHealthEndpoint() {
            try {
                console.log('Testing health endpoint:', backendUrl + '/test');
                const response = await fetch(backendUrl + '/test', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                addResult('Health Endpoint Test', `${response.status} ${response.statusText}`, {
                    status: response.status,
                    headers: Object.fromEntries(response.headers.entries()),
                    data: data
                }, !response.ok);
            } catch (error) {
                addResult('Health Endpoint Test', 'Network Error', {
                    error: error.message,
                    stack: error.stack
                }, true);
            }
        }

        async function testDebugEndpoint() {
            try {
                console.log('Testing debug endpoint:', backendUrl + '/debug');
                const response = await fetch(backendUrl + '/debug', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                addResult('Debug Endpoint Test', `${response.status} ${response.statusText}`, {
                    status: response.status,
                    data: data
                }, !response.ok);
            } catch (error) {
                addResult('Debug Endpoint Test', 'Network Error', {
                    error: error.message
                }, true);
            }
        }

        async function testCorsEndpoint() {
            try {
                console.log('Testing CORS endpoint:', backendUrl + '/debug/cors');
                const response = await fetch(backendUrl + '/debug/cors', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json',
                        'Origin': window.location.origin
                    }
                });
                
                const data = await response.json();
                addResult('CORS Debug Test', `${response.status} ${response.statusText}`, {
                    status: response.status,
                    corsHeaders: {
                        'access-control-allow-origin': response.headers.get('access-control-allow-origin'),
                        'access-control-allow-credentials': response.headers.get('access-control-allow-credentials')
                    },
                    data: data
                }, !response.ok);
            } catch (error) {
                addResult('CORS Debug Test', 'Network Error', {
                    error: error.message
                }, true);
            }
        }

        async function testLoginEndpoint() {
            try {
                console.log('Testing login endpoint:', backendUrl + '/login');
                const response = await fetch(backendUrl + '/login', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json',
                        'Origin': window.location.origin
                    },
                    body: JSON.stringify({
                        email: 'admin@example.com',
                        password: 'password'
                    })
                });
                
                const data = await response.json();
                addResult('Login Endpoint Test', `${response.status} ${response.statusText}`, {
                    status: response.status,
                    corsHeaders: {
                        'access-control-allow-origin': response.headers.get('access-control-allow-origin'),
                        'access-control-allow-credentials': response.headers.get('access-control-allow-credentials')
                    },
                    data: data
                }, !response.ok);
            } catch (error) {
                addResult('Login Endpoint Test', 'Network Error', {
                    error: error.message
                }, true);
            }
        }

        // Run initial health check
        setTimeout(() => {
            testHealthEndpoint();
        }, 1000);
    </script>
</body>
</html>
